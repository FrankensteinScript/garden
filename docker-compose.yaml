version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: garden-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: garden
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
