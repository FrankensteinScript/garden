version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: garden-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: garden
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: garden-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: garden
      DB_PASSWORD: secret
      DB_NAME: garden
    volumes:
      - .:/app
    command: npm run start:docker

volumes:
  pgdata:
